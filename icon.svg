<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Dark green background matching the savings banner -->
  <rect width="128" height="128" rx="20" fill="#1a472a"/>

  <!-- Subtle inner border -->
  <rect x="4" y="4" width="120" height="120" rx="18" fill="none" stroke="#2d6a3f" stroke-width="2"/>

  <!-- Lightning bolt — represents compression speed -->
  <path d="M 72 18 L 38 70 L 60 70 L 50 110 L 92 56 L 70 56 Z"
        fill="#4caf50" stroke="#a5d6a7" stroke-width="2" stroke-linejoin="round"/>

  <!-- Left bracket (token "before") -->
  <path d="M 22 40 L 14 40 L 14 88 L 22 88"
        fill="none" stroke="#a5d6a7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right bracket (token "after" — smaller, indicating compression) -->
  <path d="M 106 52 L 114 52 L 114 76 L 106 76"
        fill="none" stroke="#a5d6a7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
